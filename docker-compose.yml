services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: truongson
      POSTGRES_PASSWORD: truongson
      POSTGRES_DB: truongson
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truongson -d truongson"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://truongson:truongson@db:5432/truongson
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: seed
    environment:
      DATABASE_URL: postgresql://truongson:truongson@db:5432/truongson
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://truongson:truongson@db:5432/truongson
      AUTH_SECRET: ${AUTH_SECRET:?missing AUTH_SECRET — add to .env}
      # Nếu đặt cả hai, đăng nhập chỉ so khớp env (không đọc AdminUser trong DB)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

volumes:
  pgdata:
